<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW SHOP - UY TÍN HÀNG ĐẦU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d0f1a; --card: #1b1e2e; --accent: #7b2cbf; --green: #22c55e; --sub: #94a3b8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Navbar & Sidebar chuẩn video */
        .navbar { display: flex; align-items: center; padding: 15px; background: var(--bg); border-bottom: 1px solid #232736; position: sticky; top: 0; z-index: 100; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); transition: 0.3s; z-index: 200; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .side-item { padding: 15px; display: flex; align-items: center; border-radius: 12px; margin-bottom: 5px; cursor: pointer; color: var(--sub); }
        .side-item i { margin-right: 15px; width: 20px; text-align: center; }
        .side-item.active { background: #252a3d; color: white; }

        /* Bảng Chiết Khấu (Từ video gachthefast.com) */
        .discount-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        .discount-table td { border: 1px solid #2d334a; padding: 8px; text-align: center; }
        .discount-header { background: #252a3d; color: var(--accent); font-weight: bold; }

        /* Card Sản Phẩm */
        .card { background: var(--card); margin: 15px; border-radius: 20px; overflow: hidden; border: 1px solid #2d334a; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .stock-tag { position: absolute; top: 10px; right: 10px; background: var(--green); padding: 5px 10px; border-radius: 15px; font-size: 10px; font-weight: bold; }
        .price-select { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .price-btn { flex: 1; min-width: 80px; padding: 8px; border: 1px solid var(--accent); border-radius: 8px; text-align: center; font-size: 11px; cursor: pointer; }
        .price-btn.active { background: var(--accent); }

        /* Nút nổi chuẩn Zalo/Telegram */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .fab { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); width: 100%; max-width: 380px; padding: 30px; border-radius: 25px; border: 1px solid #2d334a; }
        input { width: 100%; background: #0d0f1a; border: 1px solid #2d334a; color: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 style="text-align: center; color: var(--accent);">SHADOW LOGIN</h2>
            <input type="email" id="email" placeholder="Email (Tránh mất tài khoản)">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button class="btn-main" onclick="login()">VÀO SHOP</button>
            <div style="margin-top: 15px; text-align: center; font-size: 13px; color: var(--sub);">
                <p>Quên mật khẩu? | Đăng nhập Google bên dưới</p>
                <button style="width: 100%; background: white; color: black; border-radius: 10px; border: none; padding: 10px; font-weight: bold;">
                    <i class="fab fa-google"></i> Login with Google
                </button>
            </div>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="navbar">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="font-size: 24px; margin-right: 15px; cursor: pointer;"></i>
            <div style="font-weight: bold; color: var(--accent);">SHADOW</div>
        </div>

        <div id="sidebar" class="sidebar">
            <h2 style="color: var(--accent); text-align: center;">MENU</h2>
            <div class="side-item active"><i class="fas fa-home"></i> Trang Chủ</div>
            <div class="side-item" onclick="alert('Admin đang duyệt tiền...')"><i class="fas fa-wallet"></i> Nạp Tiền</div>
            <div id="admin-btn" class="side-item" style="display:none;" onclick="openAdmin()"><i class="fas fa-user-shield"></i> Admin Panel</div>
            <div class="side-item" style="margin-top: 50px; color: #ef4444;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
        </div>

        <div class="card" style="padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 12px; color: var(--sub);">Chào, <span id="u-name"></span></div>
                    <div style="font-size: 22px; font-weight: bold;"><span id="u-money">0</span>đ</div>
                </div>
                <button class="btn-main" style="width: auto; padding: 8px 20px;" onclick="alert('Gửi seri và mã thẻ cho admin')">NẠP THẺ</button>
            </div>
            
            <h4 style="margin: 20px 0 10px 0; color: var(--accent);">BẢNG CHIẾT KHẤU THẺ</h4>
            <table class="discount-table">
                <tr class="discount-header"><td>Nhà mạng</td><td>10k-50k</td><td>100k-500k</td></tr>
                <tr><td>Viettel</td><td>-13%</td><td>-15%</td></tr>
                <tr><td>Vinaphone</td><td>-17%</td><td>-18%</td></tr>
                <tr><td>Garena</td><td>-12%</td><td>-13%</td></tr>
            </table>
        </div>

        <div id="product-list"></div>
    </div>

    <div class="fab-container">
        <div class="fab" style="background: #2563eb;" onclick="window.open('https://zalo.me/84364684151')"><i class="fas fa-comment-dots"></i></div>
        <div class="fab" style="background: #229ED9;" onclick="window.open('https://t.me/+ktWnTQrZAKthYmZl')"><i class="fab fa-telegram-plane"></i></div>
    </div>

    <script>
        const ADMIN_ACC = "shadow+999";
        const ADMIN_PASS = "HV0308hv";
        const COMMON_DESC = "menu antiband updete thường xuyên lưu ý cách chơi khi muốn chơi thì log acc clone trước chơi 1 trận nếu không band thì có thể log acc 9 khi off nhớ đang xuất acc game";

        // Hệ thống Auto-save LocalStorage
        let db = JSON.parse(localStorage.getItem('shadow_v5')) || {
            users: {}, stock: { lv5: ["Key_1", "Key_2"], drip: ["Key_3"], zy: ["Key_4"] }
        };

        function saveDB() { localStorage.setItem('shadow_v5', JSON.stringify(db)); }
        window.onbeforeunload = saveDB; // Auto-save khi thoát web

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e === ADMIN_ACC && p === ADMIN_PASS) document.getElementById('admin-btn').style.display = 'flex';
            
            if(!db.users[e]) db.users[e] = { pass: p, money: 0 };
            else if(db.users[e].pass !== p) return alert("Sai mật khẩu!");

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('u-name').innerText = e;
            render();
        }

        function render() {
            const products = [
                { id: 'lv5', name: 'Acc Lv5 Google', price: 2500, img: '1000182079.jpg', desc: 'đăng nhập google, sẵn combo kĩ năng nhân vật, quay video toàn bộ quá trình mua và đăng nhập để được bảo hành khi lỗi' },
                { id: 'drip', name: 'Drip Silent', img: '1000182074.jpg', desc: COMMON_DESC, prices: { '1 Day': 60000, '7 Day': 100000, '30 Day': 160000 } },
                { id: 'zy', name: 'Zygame', img: '1000182075.jpg', desc: COMMON_DESC, prices: { '1 Day': 30000, '3 Day': 60000, '7 Day': 80000, '30 Day': 130000 } }
            ];

            let html = '';
            products.forEach(p => {
                const count = db.stock[p.id].length;
                html += `
                <div class="card">
                    <div class="stock-tag">CÒN: ${count}</div>
                    <img src="${p.img}">
                    <div style="padding: 15px;">
                        <div style="font-weight: bold; font-size: 18px;">${p.name}</div>
                        ${p.prices ? `
                            <div class="price-select">
                                ${Object.entries(p.prices).map(([t, v]) => `<div class="price-btn">${t}: ${v.toLocaleString()}đ</div>`).join('')}
                            </div>
                        ` : `<div style="color:var(--green); font-size:20px; font-weight:bold; margin:10px 0;">${p.price.toLocaleString()}đ</div>`}
                        <p style="font-size: 11px; color: var(--sub);">${p.desc}</p>
                        <button class="btn-main" onclick="buy('${p.id}')">MUA NGAY</button>
                    </div>
                </div>`;
            });
            document.getElementById('product-list').innerHTML = html;
        }

        function buy(id) {
            const user = document.getElementById('u-name').innerText;
            if(db.stock[id].length === 0) return alert("Hết hàng!");
            if(db.users[user].money < 2500) return alert("Không đủ tiền! Vui lòng nạp."); // Ví dụ check giá min

            const key = db.stock[id].shift(); // Lấy key ra và xóa khỏi kho ngay lập tức
            saveDB(); render();
            alert("MUA THÀNH CÔNG! Key của bạn: " + key + "\n(Lưu ý: Key này chỉ hiện 1 lần duy nhất)");
        }
    </script>
</body>
</html>
